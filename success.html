<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تم الحجز — صالون عبدالله</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --gold-dim: #8a6f2e;
        --black: #080808;
        --card: #141414;
        --border: rgba(201,168,76,0.18);
        --text: #f0ede6;
        --muted: #6a6560;
        --active: #1D9E75;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Tajawal', sans-serif;
        background: var(--black);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        top: -200px; right: -200px;
        width: 600px; height: 600px;
        background: radial-gradient(circle, rgba(29,158,117,0.07) 0%, transparent 70%);
        pointer-events: none;
    }

    body::after {
        content: '';
        position: fixed;
        bottom: -200px; left: -200px;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(201,168,76,0.05) 0%, transparent 70%);
        pointer-events: none;
    }

    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 48px 36px;
        text-align: center;
        max-width: 380px;
        width: 100%;
        position: relative;
        z-index: 1;
        animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes popIn {
        from { opacity: 0; transform: scale(0.85); }
        to { opacity: 1; transform: scale(1); }
    }

    .check-circle {
        width: 80px;
        height: 80px;
        background: rgba(29,158,117,0.12);
        border: 2px solid rgba(29,158,117,0.4);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 24px;
        font-size: 36px;
        animation: checkPop 0.5s ease 0.3s both;
    }

    @keyframes checkPop {
        from { transform: scale(0); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .title {
        font-size: 26px;
        font-weight: 900;
        color: var(--active);
        margin-bottom: 10px;
    }

    .subtitle {
        font-size: 16px;
        color: var(--muted);
        font-weight: 300;
        line-height: 1.7;
        margin-bottom: 10px;
    }

    .gold-line {
        width: 50px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        margin: 20px auto;
    }

    .reminder {
        background: rgba(201,168,76,0.07);
        border: 1px solid rgba(201,168,76,0.2);
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 13px;
        color: #d4c9a8;
        line-height: 1.8;
        margin-bottom: 28px;
        text-align: right;
    }

    .reminder-icon {
        font-size: 16px;
        margin-left: 6px;
    }

    .btn {
        display: block;
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--gold-dim), var(--gold));
        border: none;
        border-radius: 12px;
        color: #080808;
        font-family: 'Tajawal', sans-serif;
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;
        text-decoration: none;
        transition: opacity 0.2s, transform 0.15s;
        letter-spacing: 0.5px;
    }

    .btn:active { transform: scale(0.97); }
    .btn:hover { opacity: 0.9; }

    .salon-name {
        margin-top: 20px;
        font-size: 12px;
        color: var(--muted);
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div class="card">
    <div class="check-circle">✅</div>

    <h2 class="title">تم الحجز بنجاح!</h2>
    <p class="subtitle">ننتظرك في موعدك 👌<br>نتمنى لك تجربة رائعة</p>

    <div class="gold-line"></div>

    <div class="reminder">
        <span class="reminder-icon">⚠️</span>
        تذكر: إذا تأخرت عن موعدك سيتم إلغاء حجزك تلقائياً وسيصبح متاحاً للآخرين.
    </div>

    <a href="/" class="btn">← الرجوع للرئيسية</a>

    <div class="salon-name">✂️ صالون عبدالله — فرع أكتوبر</div>
</div>

</body>
</html>
