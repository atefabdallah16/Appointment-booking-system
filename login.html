<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دخول الأدمن — صالون عبدالله</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #c9a84c;
        --gold-light: #e8c97a;
        --gold-dim: #8a6f2e;
        --black: #080808;
        --card: #141414;
        --border: rgba(201,168,76,0.18);
        --text: #f0ede6;
        --muted: #6a6560;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Tajawal', sans-serif;
        background: var(--black);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
        position: relative;
        overflow: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        top: -200px; right: -200px;
        width: 600px; height: 600px;
        background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
        pointer-events: none;
    }

    body::after {
        content: '';
        position: fixed;
        bottom: -200px; left: -200px;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(201,168,76,0.04) 0%, transparent 70%);
        pointer-events: none;
    }

    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 24px;
        padding: 44px 32px;
        width: 100%;
        max-width: 360px;
        position: relative;
        z-index: 1;
        animation: fadeUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .header {
        text-align: center;
        margin-bottom: 32px;
    }

    .lock-icon {
        width: 64px;
        height: 64px;
        background: rgba(201,168,76,0.08);
        border: 1px solid rgba(201,168,76,0.25);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        margin: 0 auto 16px;
    }

    .header h2 {
        font-size: 22px;
        font-weight: 900;
        color: var(--gold);
        margin-bottom: 4px;
    }

    .header p {
        font-size: 13px;
        color: var(--muted);
        font-weight: 300;
    }

    .gold-line {
        width: 40px;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--gold), transparent);
        margin: 14px auto 0;
    }

    .input-group {
        margin-bottom: 20px;
    }

    .input-label {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
        display: block;
        font-weight: 500;
        letter-spacing: 0.5px;
    }

    .input-wrapper {
        position: relative;
    }

    input[type="password"] {
        width: 100%;
        padding: 13px 16px;
        background: #0d0d0d;
        border: 1px solid rgba(201,168,76,0.15);
        border-radius: 10px;
        color: var(--text);
        font-family: 'Tajawal', sans-serif;
        font-size: 18px;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
        letter-spacing: 4px;
        text-align: center;
    }

    input[type="password"]::placeholder {
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 1px;
    }

    input[type="password"]:focus {
        border-color: var(--gold-dim);
        box-shadow: 0 0 0 3px rgba(201,168,76,0.08);
    }

    .btn {
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, var(--gold-dim), var(--gold));
        border: none;
        border-radius: 12px;
        color: #080808;
        font-family: 'Tajawal', sans-serif;
        font-size: 17px;
        font-weight: 900;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.15s;
        letter-spacing: 0.5px;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.97); }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: var(--muted);
        text-decoration: none;
        transition: color 0.2s;
    }

    .back-link:hover { color: var(--gold); }

    .salon-name {
        text-align: center;
        margin-top: 28px;
        font-size: 11px;
        color: #2a2a2a;
        letter-spacing: 1px;
    }
</style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="lock-icon">🔐</div>
        <h2>دخول الأدمن</h2>
        <p>أدخل كلمة المرور للمتابعة</p>
        <div class="gold-line"></div>
    </div>

    <form method="POST">
        <div class="input-group">
            <label class="input-label">كلمة المرور</label>
            <div class="input-wrapper">
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
        </div>
        <button type="submit" class="btn">دخول ←</button>
    </form>

    <a href="/" class="back-link">← الرجوع للرئيسية</a>

    <div class="salon-name">✂️ صالون عبدالله — للأدمن فقط</div>
</div>

</body>
</html>
